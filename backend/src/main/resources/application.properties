server.port=${SERVER_PORT:8080}

# Carrega variaveis do arquivo .env (formato KEY=VALUE) na raiz do backend
spring.config.import=optional:file:./.env[.properties]

# H2
spring.datasource.url=jdbc:h2:mem:guiacidadao
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Groq (provider principal — com web search via compound)
groq.api.key=${GROQ_API_KEY:}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.model=${GROQ_MODEL:groq/compound}
groq.fallback.model=${GROQ_FALLBACK_MODEL:llama-3.3-70b-versatile}
groq.timeout.seconds=${GROQ_TIMEOUT:45}
groq.max-tokens=${GROQ_MAX_TOKENS:1500}
groq.temperature=${GROQ_TEMPERATURE:0.3}

# OpenRouter (fallback)
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.api.url=${OPENROUTER_API_URL:https://openrouter.ai/api/v1/chat/completions}
openrouter.model=${OPENROUTER_MODEL:google/gemma-4-31b-it:free}
openrouter.timeout.seconds=${OPENROUTER_TIMEOUT_SECONDS:30}
openrouter.max-tokens=${OPENROUTER_MAX_TOKENS:1500}
openrouter.temperature=${OPENROUTER_TEMPERATURE:0.3}

# External APIs (all optional - graceful degradation)
brasilapi.url=https://brasilapi.com.br/api
cnes.api.url=https://apidadosabertos.saude.gov.br/cnes
farmacia.popular.api.url=https://apifarmaciaaberta.saude.gov.br/api/v1
transparencia.api.url=https://api.portaldatransparencia.gov.br
transparencia.api.key=${PORTAL_TRANSPARENCIA_API_KEY:}
tcu.api.url=https://rest.tcu.gov.br
tcu.certidao.url=https://contas.tcu.gov.br/ncontaspub
brasilia.ibge.code=530010

# Métricas TCU / impacto fiscal (premissas auditáveis)
guiacidadao.fiscal.custo-atendimento-presencial.min=${GUIA_FISCAL_CUSTO_MIN:40}
guiacidadao.fiscal.custo-atendimento-presencial.max=${GUIA_FISCAL_CUSTO_MAX:80}
guiacidadao.fiscal.investimento-sistema-reais=${GUIA_INVESTIMENTO_SISTEMA_REAIS:0}
guiacidadao.release.version=${GUIA_RELEASE_VERSION:1.0.0-demo}

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:*}

# Logging
logging.level.br.gov.df.guiacidadao=DEBUG
logging.level.org.springframework.web=INFO
